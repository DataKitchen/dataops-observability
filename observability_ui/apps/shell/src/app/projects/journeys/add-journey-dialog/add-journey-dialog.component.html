<!-- TITLE -->
<h1 class="dialog-title"
  mat-dialog-title>
  Add Journey
  <button mat-icon-button
    mat-dialog-close>
    <mat-icon>close</mat-icon>
  </button>
</h1>

<div mat-dialog-content
  [formGroup]="formGroup">
  <text-field formControlName="name"
    label="Name">
    <text-field-error type="required">Field is required</text-field-error>
  </text-field>

  <mat-form-field class="top-margin">
    <textarea formControlName="description"
      matInput
      placeholder="Description"
      rows="2"></textarea>
  </mat-form-field>

  <text-field formControlName="component_include_patterns"
    label="Component include patterns"
    placeholder="Component include patterns">
  </text-field>

  <text-field formControlName="component_exclude_patterns"
    label="Component exclude patterns"
    placeholder="Component exclude patterns">
  </text-field>

  <div class="pattern-preview">
    <button mat-stroked-button
      type="button"
      (click)="previewComponents()"
      [disabled]="previewing">
      {{ previewing ? 'Previewing...' : 'Preview matching components' }}
    </button>

    <div *ngIf="previewResults !== null"
      class="preview-results">
      <span *ngIf="previewResults.length === 0"
        class="text--secondary">No components match the current patterns.</span>
      <ul *ngIf="previewResults.length > 0"
        class="preview-list">
        <li *ngFor="let c of previewResults">{{ c.key }}</li>
      </ul>
    </div>
  </div>

  <mat-expansion-panel class="mat-elevation-z0">
    <mat-expansion-panel-header>
      <mat-panel-title>
        Instance Conditions
      </mat-panel-title>
    </mat-expansion-panel-header>

    <shell-journey-instance-rules
      [editing]="true"
      [components]="components$ | async"
      formControlName="instance_rules"></shell-journey-instance-rules>

  </mat-expansion-panel>

  <div>{{error | json}}</div>
</div>

<div mat-dialog-actions
  class="dialog-actions">
  <!-- CANCEL -->
  <button mat-dialog-close
    mat-button
    class="mat-button--cancel">
    Cancel
  </button>

  <!-- ADD -->
  <button mat-flat-button
    color="primary"
    (click)="addJourney(formGroup.value)"
    [disabled]="(formGroup.touched && formGroup.invalid) || !formGroup.dirty || (adding$ | async) === true">
    <ng-container *ngIf="adding$ | async; else buttonLabel">
      Adding
    </ng-container>
    <ng-template #buttonLabel>
      Add
    </ng-template>
  </button>
</div>
