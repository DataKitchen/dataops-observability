#
# Values for minikube deployment
#

observability:
  flask_debug: "true"
  image:
    repository: ""
    tag: "latest"

observability_ui:
  enable: true
  image:
    name: "observability-ui"
    pullPolicy: Never

observability_api:
  image:
    name: "observability-be"
    pullPolicy: Never
  service:
    type: NodePort
    nodePort: 5000

event_api:
  image:
    name: "observability-be"
    pullPolicy: Never
  service:
    type: NodePort
    nodePort: 5001

agent_api:
  image:
    name: "observability-be"
    pullPolicy: Never
  service:
    type: NodePort
    nodePort: 5003

event_store:
  image:
    name: "observability-be"
    pullPolicy: Never

run_manager:
  image:
    name: "observability-be"
    pullPolicy: Never

rules_engine:
  image:
    name: "observability-be"
    pullPolicy: Never

scheduler:
  image:
    name: "observability-be"
    pullPolicy: Never

cli_hook:
  image:
    name: "observability-be"
    pullPolicy: Never
